<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160">
  <!-- Elongated dry-brush swipe: rough turbulence-displaced edges + bristle streaks -->
  <defs>
    <filter id="rough" x="-15%" y="-40%" width="130%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.032 0.11" numOctaves="4" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="24"/>
    </filter>
    <filter id="rough2" x="-15%" y="-40%" width="130%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05 0.18" numOctaves="3" seed="19" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="16"/>
    </filter>
  </defs>
  <g fill="#000">
    <rect x="16" y="20" width="568" height="120" rx="42" filter="url(#rough)"/>
    <rect x="4" y="66" width="90" height="10" rx="5" filter="url(#rough2)"/>
    <rect x="508" y="40" width="88" height="8" rx="4" filter="url(#rough2)"/>
    <rect x="500" y="108" width="96" height="9" rx="4" filter="url(#rough2)"/>
    <rect x="30" y="126" width="80" height="7" rx="3" filter="url(#rough2)"/>
  </g>
</svg>
